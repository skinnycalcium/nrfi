name: NRFI Daily

on:
  schedule:
    # Morning run: email + today's picks + attempt to grade yesterday
    # 13:00 UTC = 9 AM ET (summer) / 8 AM ET (winter)
    - cron: '0 13 * * *'
    # Late night run: grade yesterday's games after all are final
    # 06:00 UTC = 2 AM ET (summer) / 1 AM ET (winter)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      # Morning run (13:00 UTC) — full pipeline
      - name: Run NRFI scan + email
        if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          BANKROLL: ${{ secrets.BANKROLL }}
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: python nrfi_email.py

      - name: Track picks + grade prior days
        if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BANKROLL: ${{ secrets.BANKROLL }}
        run: python nrfi_track.py

      # Late night run (06:00 UTC) — just grade yesterday's results
      - name: Grade yesterday's results
        if: github.event.schedule == '0 6 * * *'
        run: python nrfi_grade_only.py

      - name: Commit updated picks data
        run: |
          git config user.name "nrfi-bot"
          git config user.email "nrfi-bot@users.noreply.github.com"
          git add picks_today.json picks_history.json picks_summary.json latest.html nrfi_report_*.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update picks data $(date -u +%Y-%m-%d-%H%M)"
          git push || true

      - name: Publish dashboard to gh-pages
        if: github.event.schedule == '0 13 * * *' || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: '**/*.py,**/*.md,**/*.txt,.github/**'
