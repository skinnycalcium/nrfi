name: NRFI Daily

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM ET daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run NRFI scan + email
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          BANKROLL: ${{ secrets.BANKROLL }}
          PAGES_URL: ${{ secrets.PAGES_URL }}
        run: python nrfi_email.py

      - name: Track picks + grade prior days
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BANKROLL: ${{ secrets.BANKROLL }}
        run: python nrfi_track.py

      - name: Commit updated picks data
        run: |
          git config user.name "nrfi-bot"
          git config user.email "nrfi-bot@users.noreply.github.com"
          git add picks_today.json picks_history.json picks_summary.json || true
          git diff --staged --quiet || git commit -m "Update picks data $(date -u +%Y-%m-%d)"
          git push || true

      - name: Publish dashboard to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: '**/*.py,**/*.md,**/*.txt,.github/**'
